spring.application.name=MAE Cualde

# PORT — Railway injects this automatically; local dev defaults to 8080
server.port=${PORT:8080}

# ── Intelligence Keys ────────────────────────────────────────────────────────
# Local:  application-local.properties  (gitignored — never commit)
# Online: set env vars in Railway dashboard
# Empty string default = app starts without keys (offline/static mode)

# Claude (Anthropic) — tactical reasoning, doctrine ops
claude.api.key=${ANTHROPIC_API_KEY:}
claude.api.model=claude-haiku-4-5-20251001

# Perplexity Sonar — web-aware research, real-time intel
perplexity.api.key=${PERPLEXITY_API_KEY:}
perplexity.api.model=sonar-pro

# ── Actuator — Railway health check at /actuator/health ─────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

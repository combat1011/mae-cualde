name: Notion Sync

# Syncs Notion databases to docs/data/*.json
# Works two ways:
#   A) GitHub Actions (if NOTION_API_KEY secret is set)
#   B) Local:  node scripts/notion-sync.js  (no GitHub settings needed)
#
# LOCAL SETUP (recommended — no GitHub settings required):
#   cp .notion.example.json .notion.json
#   # fill in api_key and database IDs
#   node scripts/notion-sync.js
#   git add docs/data && git push

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - '.github/workflows/notion-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync Notion → docs/data
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script (requires NOTION_API_KEY secret)
        env:
          NOTION_API_KEY:    ${{ secrets.NOTION_API_KEY }}
          NOTION_PROFILE_DB: ${{ secrets.NOTION_PROFILE_DB }}
          NOTION_DRONE_DB:   ${{ secrets.NOTION_DRONE_DB }}
          NOTION_TASKS_DB:   ${{ secrets.NOTION_TASKS_DB }}
          NOTION_MEMS_DB:    ${{ secrets.NOTION_MEMS_DB }}
        run: |
          if [ -z "$NOTION_API_KEY" ]; then
            echo "NOTION_API_KEY secret not set — skipping server-side sync."
            echo "Run  node scripts/notion-sync.js  locally instead."
            exit 0
          fi

          # Build a temporary config from environment variables
          cat > .notion.json <<EOF
          {
            "api_key": "$NOTION_API_KEY",
            "databases": {
              "profile": "$NOTION_PROFILE_DB",
              "drone":   "$NOTION_DRONE_DB",
              "tasks":   "$NOTION_TASKS_DB",
              "mems":    "$NOTION_MEMS_DB"
            }
          }
          EOF

          node scripts/notion-sync.js

      - name: Commit synced data
        run: |
          git config user.name  "mae-bot"
          git config user.email "mae-bot@users.noreply.github.com"
          git add docs/data/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "notion sync $(date -u '+%Y-%m-%d %H:%M')"
            git push
          fi

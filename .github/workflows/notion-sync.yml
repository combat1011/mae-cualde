name: Notion → GitHub Sync

# ─────────────────────────────────────────────────────────────────
# Pulls data from your Notion workspace and writes it to
# docs/data/notion-sync.json so the MAE website can read it
# client-side without exposing your API key.
#
# SETUP:
#   1. Add secrets in GitHub → Settings → Secrets → Actions:
#      NOTION_API_KEY      — your Notion integration token
#      NOTION_DATABASE_ID  — database ID from your Notion URL
#      (optional) NOTION_PAGE_ID — top-level page ID instead of database
#
#   2. Create a Notion integration at https://www.notion.so/my-integrations
#      and share your database/page with it.
#
#   3. Push this file — the action runs automatically on schedule.
# ─────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  push:
    branches: [ main, 'claude/**' ]
    paths:
      - '.github/workflows/notion-sync.yml'
  workflow_dispatch:          # manual trigger from GitHub UI

permissions:
  contents: write             # needed to push notion-sync.json

jobs:
  sync-notion:
    name: Sync Notion Data
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Notion data
        env:
          NOTION_API_KEY:     ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_PAGE_ID:     ${{ secrets.NOTION_PAGE_ID }}
        run: |
          python3 - <<'EOF'
          import os, json, requests, sys
          from datetime import datetime, timezone

          API_KEY     = os.getenv('NOTION_API_KEY', '')
          DATABASE_ID = os.getenv('NOTION_DATABASE_ID', '')
          PAGE_ID     = os.getenv('NOTION_PAGE_ID', '')

          HEADERS = {
              'Authorization':  f'Bearer {API_KEY}',
              'Notion-Version': '2022-06-28',
              'Content-Type':   'application/json'
          }

          output = {
              'synced_at': datetime.now(timezone.utc).isoformat(),
              'source':    'notion',
              'tasks':     [],
              'pages':     []
          }

          # ── Pull database rows (tasks/items) ──
          if API_KEY and DATABASE_ID:
              url = f'https://api.notion.com/v1/databases/{DATABASE_ID}/query'
              try:
                  res  = requests.post(url, headers=HEADERS, json={'page_size': 50}, timeout=15)
                  data = res.json()
                  for row in data.get('results', []):
                      props = row.get('properties', {})
                      # Extract title (works for most Notion databases)
                      title = ''
                      for prop in props.values():
                          if prop.get('type') == 'title':
                              texts = prop.get('title', [])
                              title = ''.join(t.get('plain_text', '') for t in texts)
                              break
                      # Extract status
                      status = ''
                      for prop in props.values():
                          if prop.get('type') == 'status':
                              s = prop.get('status')
                              if s: status = s.get('name', '')
                          elif prop.get('type') == 'select':
                              s = prop.get('select')
                              if s: status = s.get('name', '')
                      output['tasks'].append({
                          'id':         row.get('id'),
                          'title':      title,
                          'status':     status,
                          'url':        row.get('url', ''),
                          'created':    row.get('created_time', ''),
                          'updated':    row.get('last_edited_time', '')
                      })
                  print(f"[NOTION] Fetched {len(output['tasks'])} database rows")
              except Exception as e:
                  print(f"[NOTION] Database fetch error: {e}", file=sys.stderr)

          # ── Pull top-level page children (blocks) ──
          if API_KEY and PAGE_ID:
              url = f'https://api.notion.com/v1/blocks/{PAGE_ID}/children'
              try:
                  res  = requests.get(url, headers=HEADERS, params={'page_size': 50}, timeout=15)
                  data = res.json()
                  for block in data.get('results', []):
                      btype = block.get('type', '')
                      text  = ''
                      inner = block.get(btype, {})
                      for rich in inner.get('rich_text', []):
                          text += rich.get('plain_text', '')
                      if text:
                          output['pages'].append({
                              'id':    block.get('id'),
                              'type':  btype,
                              'title': text
                          })
                  print(f"[NOTION] Fetched {len(output['pages'])} page blocks")
              except Exception as e:
                  print(f"[NOTION] Page fetch error: {e}", file=sys.stderr)

          # ── Write output ──
          out_path = 'docs/data/notion-sync.json'
          os.makedirs(os.path.dirname(out_path), exist_ok=True)
          with open(out_path, 'w') as f:
              json.dump(output, f, indent=2)
          print(f"[NOTION] Written to {out_path}")
          print(f"[NOTION] Tasks: {len(output['tasks'])}, Pages: {len(output['pages'])}")
          EOF

      - name: Commit and push notion-sync.json
        run: |
          git config user.name  "MAE MegaCorp Bot"
          git config user.email "mae-bot@users.noreply.github.com"
          git add docs/data/notion-sync.json
          if git diff --cached --quiet; then
            echo "No changes to notion-sync.json — skipping commit."
          else
            git commit -m "chore: notion sync $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
